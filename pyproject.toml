[project]
name = "arca-agent"
version = "0.1.0"
description = "ARCA — Local RL-powered Autonomous Cyber Agent"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "Dipayan Dasgupta"}]

dependencies = [
    "numpy>=1.24", "gymnasium>=0.29", "stable-baselines3>=2.2",
    "networkx>=3.0", "torch>=2.0", "fastapi>=0.110", "uvicorn[standard]>=0.29",
    "pydantic>=2.0", "rich>=13.0", "typer>=0.12", "matplotlib>=3.8",
    "plotly>=5.20", "langgraph>=0.1", "langchain>=0.2", "ollama>=0.2"
]

[project.optional-dependencies]
dev = ["pytest", "black", "ruff"]
cpp = ["pybind11>=2.11"]

[project.scripts]
arca = "arca.cli:main"

[build-system]
requires = ["setuptools>=68", "wheel", "pybind11>=2.11"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["arca"]
include-package-data = true
